name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web — test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Install
        run: yarn install --immutable

      - name: Format
        run: yarn format:check

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build
